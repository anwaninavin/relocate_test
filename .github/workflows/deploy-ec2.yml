name: Deploy to EC2

# Mirrors the Render/Vercel auto-deploy: every push to main ships the same
# commit to the self-hosted box. See PackwithMe deployment runbook §6b for
# the one-time server setup this depends on (git clone at ~/hostel-git,
# pm2 process "hostel-api", static webroot /var/www/hostel/dist).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            # 1GB box: tsc/vite OOM under the default V8 heap without this.
            export NODE_OPTIONS=--max-old-space-size=1536

            cd ~/hostel-git
            git fetch origin main
            git reset --hard origin/main

            cd ~/hostel-git/backend
            npm ci --no-audit --no-fund
            npm run build

            cd ~/hostel-git/frontend
            npm ci --no-audit --no-fund
            npm run build

            sudo mkdir -p /var/www/hostel/dist
            sudo rm -rf /var/www/hostel/dist/*
            sudo cp -r dist/. /var/www/hostel/dist/

            cd ~/hostel-git/backend
            pm2 restart hostel-api --update-env || pm2 start dist/index.js --name hostel-api --time
            pm2 save

            sudo nginx -t
            sudo systemctl reload nginx
